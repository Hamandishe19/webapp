<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Climate Monitor — Real-Time Temperature &amp; Humidity</title>
    <meta name="description" content="Live DHT22 sensor dashboard displaying real-time temperature and humidity readings with interactive charts.">
    <meta name="theme-color" content="#08101d">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Climate Monitor">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="/JS/manifest.json">
    <link rel="icon" type="image/png" href="/assets/Images/icon.png">
    <link rel="shortcut icon" href="/assets/Images/icon.png" type="image/x-icon">
    <link rel="stylesheet" href="/CSS/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/JS/script.js" defer></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/JS/service-worker.js').catch(() => {});
        }
    </script>
</head>
<body>

    <main class="dashboard">
        <!-- Header -->
        <header class="header" id="dashboard-header">
            <div class="header__badge">
                <span class="header__badge-dot"></span>
                Live Monitoring
            </div>
            <h1 class="header__title">Climate Monitor</h1>
        </header>

        <!-- Mode Toggle -->
        <div class="toggle-bar">
            <button id="toggleMode" class="toggle-btn" aria-label="Switch display mode">
                <span class="toggle-btn__icon">📊</span>
                <span class="toggle-btn__text">Switch to Graph Mode</span>
            </button>
        </div>

        <!-- Numerical Mode -->
        <div id="numericalMode">
            <section class="cards">
                <!-- Temperature Card -->
                <article class="card card--temp" id="temp-card">
                    <div class="card__icon-row">
                        <div class="card__icon">🌡️</div>
                        <div class="card__trend" id="temp-trend">
                            <span>—</span>
                        </div>
                    </div>
                    <p class="card__label">Temperature</p>
                    <p class="card__value" id="temperature">
                        <span class="loading-shimmer" style="display:inline-block;width:120px;height:40px;border-radius:8px;">&nbsp;</span>
                    </p>
                    <div class="card__bar-track">
                        <div class="card__bar-fill" id="temp-bar" style="width: 0%"></div>
                    </div>
                </article>

                <!-- Humidity Card -->
                <article class="card card--humid" id="humid-card">
                    <div class="card__icon-row">
                        <div class="card__icon">💧</div>
                        <div class="card__trend" id="humid-trend">
                            <span>—</span>
                        </div>
                    </div>
                    <p class="card__label">Humidity</p>
                    <p class="card__value" id="humidity">
                        <span class="loading-shimmer" style="display:inline-block;width:120px;height:40px;border-radius:8px;">&nbsp;</span>
                    </p>
                    <div class="card__bar-track">
                        <div class="card__bar-fill" id="humid-bar" style="width: 0%"></div>
                    </div>
                </article>
            </section>

            <!-- Status Bar -->
            <div class="status-bar" id="status-bar">
                <div class="status-item">
                    <span class="status-item__dot status-item__dot--green"></span>
                    <span id="connection-status">Connecting…</span>
                </div>
                <div class="status-divider"></div>
                <div class="status-item">
                    <span class="status-item__dot status-item__dot--blue"></span>
                    <span id="last-update">Last update: —</span>
                </div>
                <div class="status-divider"></div>
                <div class="status-item">
                    <span class="status-item__dot status-item__dot--amber"></span>
                    <span>Refresh: 15s</span>
                </div>
            </div>
        </div>

        <!-- Graph Mode -->
        <div id="graphMode" class="hidden">
            <div class="graph-panel">
                <div class="graph-panel__header">
                    <div>
                        <p class="graph-panel__title">Historical Readings</p>
                        <p class="graph-panel__subtitle">Last 20 data points from ThingSpeak</p>
                    </div>
                    <div class="graph-panel__legend">
                        <div class="legend-item">
                            <span class="legend-dot legend-dot--temp"></span>
                            Temperature
                        </div>
                        <div class="legend-item">
                            <span class="legend-dot legend-dot--humid"></span>
                            Humidity
                        </div>
                    </div>
                </div>
                <canvas id="dataChart"></canvas>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>Powered by <span class="footer__brand">Code Architect</span> &middot; 6 Compton Close</p>
    </footer>

</body>
</html>
